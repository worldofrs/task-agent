# Google Cloud Build CI/CD pipeline
# Triggered automatically when you push to your connected repo.
#
# What it does:
# 1. Installs dependencies and runs tests
# 2. Builds a Docker container image
# 3. Pushes the image to Google Artifact Registry
# 4. Deploys the image to Cloud Run
#
# Prerequisites:
#   - Enable Cloud Build, Cloud Run, and Artifact Registry APIs
#   - Create an Artifact Registry repo:
#       gcloud artifacts repositories create task-agent --repository-format=docker --location=us-central1
#   - Grant Cloud Build permission to deploy to Cloud Run:
#       gcloud projects add-iam-policy-binding $PROJECT_ID \
#         --member="serviceAccount:$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')@cloudbuild.gserviceaccount.com" \
#         --role="roles/run.admin"
#   - Set up a Cloud Build trigger connected to your GitHub repo

substitutions:
  _SERVICE_NAME: task-agent
  _REGION: us-central1

steps:
  # Step 1: Install dependencies
  - name: "node:20"
    entrypoint: npm
    args: ["ci"]

  # Step 2: Run tests
  - name: "node:20"
    entrypoint: npx
    args: ["jest", "--verbose"]

  # Step 3: Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/task-agent/${_SERVICE_NAME}:$COMMIT_SHA",
        ".",
      ]

  # Step 4: Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/$PROJECT_ID/task-agent/${_SERVICE_NAME}:$COMMIT_SHA",
      ]

  # Step 5: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/task-agent/${_SERVICE_NAME}:$COMMIT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/task-agent/${_SERVICE_NAME}:$COMMIT_SHA"
